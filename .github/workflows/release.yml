name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-source-artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-platform-package:
    needs: release-source-artifacts
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13
            platform: darwin
            arch: x64
          - runner: macos-14
            platform: darwin
            arch: arm64
          - runner: ubuntu-24.04
            platform: linux
            arch: x64
          - runner: ubuntu-24.04-arm
            platform: linux
            arch: arm64
          - runner: windows-2022
            platform: win32
            arch: x64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install npm build dependencies
        working-directory: npm
        run: npm install

      - name: Set npm package version from tag
        working-directory: npm
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version
        shell: bash

      - name: Sync optional dependency versions
        working-directory: npm
        run: npm run sync:platform-deps

      - name: Copy README to npm package
        run: cp README.md npm/README.md
        shell: bash

      - name: Prepare platform package
        working-directory: npm
        shell: bash
        run: |
          npm run prepare:platform -- \
            --platform "${{ matrix.platform }}" \
            --arch "${{ matrix.arch }}" \
            --version "${GITHUB_REF_NAME#v}" \
            --output-dir "dist/platform-packages"

      - name: Publish platform package
        working-directory: npm/dist/platform-packages/${{ matrix.platform }}-${{ matrix.arch }}
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME#v}" == *beta* ]]; then
            npm publish --access public --tag beta
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-wrapper-package:
    needs: publish-platform-package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Set npm package version from tag
        working-directory: npm
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version
        shell: bash

      - name: Sync optional dependency versions
        working-directory: npm
        run: npm run sync:platform-deps

      - name: Copy README to npm package
        run: cp README.md npm/README.md
        shell: bash

      - name: Publish main npm package
        working-directory: npm
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME#v}" == *beta* ]]; then
            npm publish --access public --tag beta
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
